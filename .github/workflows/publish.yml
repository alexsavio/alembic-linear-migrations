name: Publish

# Publishes to PyPI via Trusted Publishing (OIDC): no API token is stored in
# this repository. PyPI must have a pending publisher configured for
# alembic-linear-migrations -> alexsavio/alembic-linear-migrations, workflow
# `publish.yml`, environment `pypi`.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          # A restored cache can feed into the artifact this job publishes, and
          # a release build is the worst place to accept that risk. Nothing here
          # is hot enough to be worth caching anyway.
          enable-cache: false

      - name: Refuse to publish a tag that disagrees with the package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          version="$(uv version --short)"
          if [ "$tag" != "$version" ]; then
            echo "::error::tag v$tag does not match project version $version"
            exit 1
          fi
          echo "tag v$tag matches project version $version"

      - run: uv lock --check
      - run: uv build
      - run: uvx twine check --strict dist/*
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/alembic-linear-migrations
    permissions:
      id-token: write # mints the OIDC token Trusted Publishing exchanges
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
