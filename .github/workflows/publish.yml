name: Publish

# Publishes to PyPI via Trusted Publishing (OIDC): no API token is stored in
# this repository. PyPI must have a pending publisher configured for
# alembic-linear-migrations -> alexsavio/alembic-linear-migrations, workflow
# `publish.yml`, environment `pypi`.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7

      - name: Refuse to publish a tag that disagrees with the package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          version="$(uv version --short)"
          if [ "$tag" != "$version" ]; then
            echo "::error::tag v$tag does not match project version $version"
            exit 1
          fi
          echo "tag v$tag matches project version $version"

      - run: uv build
      - run: uvx twine check --strict dist/*
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/alembic-linear-migrations
    permissions:
      id-token: write # mints the OIDC token Trusted Publishing exchanges
    steps:
      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
