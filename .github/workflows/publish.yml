name: Publish

# Publishes to PyPI via Trusted Publishing (OIDC): no API token is stored in
# this repository. PyPI must have a Trusted Publisher configured for this repo --
# owner alexsavio, repo alembic-linear-migrations, workflow `publish.yml`,
# environment `pypi` -- either as a pending publisher (before the project exists)
# or under the existing project's Publishing settings.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # A tag can be pushed to any commit, including one CI never saw green. Re-run
  # the suite here so a red commit cannot reach PyPI through the build below.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          # No cache on the release path: this workflow can publish, and zizmor's
          # cache-poisoning audit rightly flags a restored cache here.
          enable-cache: false
      - run: uv sync --frozen
      - name: Configure git identity for the merge/rebase tests
        run: |
          git config --global user.name "CI"
          git config --global user.email "ci@example.com"
          git config --global init.defaultBranch main
      - run: uv run --no-sync pytest -m "not slow"

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # hatch-vcs derives the version from the newest reachable tag, which a
          # shallow clone would not fetch.
          fetch-depth: 0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          # A restored cache can feed into the artifact this job publishes, and
          # a release build is the worst place to accept that risk. Nothing here
          # is hot enough to be worth caching anyway.
          enable-cache: false

      - run: uv lock --check
      - run: uv build

      # hatch-vcs makes the tag the version, so a tag/version mismatch is not
      # possible. What can still go wrong is building a non-exact version -- a
      # dirty tree or a checkout that missed the tag yields a .dev / +local
      # build. Refuse to publish anything but a clean release.
      - name: Refuse to publish a dev or local build
        run: |
          for artifact in dist/*.whl; do
            version="$(basename "$artifact" | cut -d- -f2)"
            case "$version" in
              *.dev* | *+*)
                echo "::error::built version $version is not a clean release; check the tag and fetch-depth"
                exit 1
                ;;
            esac
            echo "clean release version: $version"
          done

      - run: uvx twine check --strict dist/*
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/alembic-linear-migrations
    permissions:
      id-token: write # mints the OIDC token Trusted Publishing exchanges
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
