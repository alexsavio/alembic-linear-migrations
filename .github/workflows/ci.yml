name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_COLOR: "1"
  # Fail rather than silently resolve against a different interpreter than the
  # one a job asked for.
  UV_PYTHON_DOWNLOADS: "automatic"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # hatch-vcs derives the version from the newest reachable tag, which a
          # shallow clone would not fetch.
          fetch-depth: 0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      # --locked asserts uv.lock still matches pyproject.toml, so a dependency
      # edit that skipped `uv lock` fails here instead of drifting.
      - run: uv sync --locked
      - run: uv run --no-sync ruff format --check .
      - run: uv run --no-sync ruff check .
      # Targets py3.10 (the requires-python floor) while running on 3.13.
      - run: uv run --no-sync mypy

  # Audits the workflows themselves: unpinned actions, template injection,
  # over-broad permissions, cache poisoning on the release path. Dependabot
  # keeps the action pins current; zizmor is what insists they exist at all.
  # It comes from the dev group, so uv.lock pins zizmor too.
  zizmor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # hatch-vcs derives the version from the newest reachable tag, which a
          # shallow clone would not fetch.
          fetch-depth: 0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run --no-sync zizmor --persona=regular .github/workflows/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # enables the online audits

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        alembic: [""]
        include:
          # The floor and a mid-point of the supported alembic range. Alembic
          # resolves the hook's entry point itself, so its version matters as
          # much as Python's.
          - { os: ubuntu-latest, python: "3.10", alembic: "1.9.0" }
          - { os: ubuntu-latest, python: "3.13", alembic: "1.13.3" }
          # git's conflict markers are what rebase reads, so cover the other
          # platforms developers actually merge on.
          - { os: macos-latest, python: "3.13", alembic: "" }
          - { os: windows-latest, python: "3.13", alembic: "" }
    name: py${{ matrix.python }}${{ matrix.alembic && format(' / alembic {0}', matrix.alembic) || '' }} / ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # hatch-vcs derives the version from the newest reachable tag, which a
          # shallow clone would not fetch.
          fetch-depth: 0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          python-version: ${{ matrix.python }}
      - run: uv sync --frozen

      - name: Pin alembic
        if: matrix.alembic != ''
        run: uv pip install "alembic==${{ matrix.alembic }}"

      - name: Report the resolved versions
        run: uv run --no-sync python -c "import sys, alembic; print('python', sys.version.split()[0], '| alembic', alembic.__version__)"

      - name: Configure git identity for the merge/rebase tests
        run: |
          git config --global user.name "CI"
          git config --global user.email "ci@example.com"
          git config --global init.defaultBranch main

      - run: uv run --no-sync pytest -m "not slow" --cov --cov-report=term-missing

  # The pre-commit hook only proves itself when pre-commit builds its own
  # environment from this repository, which needs a real commit and network.
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # hatch-vcs derives the version from the newest reachable tag, which a
          # shallow clone would not fetch.
          fetch-depth: 0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - run: uv sync --frozen
      - name: Configure git identity
        run: |
          git config --global user.name "CI"
          git config --global user.email "ci@example.com"
      - run: uv run --no-sync pytest -m slow -v

  # Dogfood the hooks this repo defines for its own tree.
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # hatch-vcs derives the version from the newest reachable tag, which a
          # shallow clone would not fetch.
          fetch-depth: 0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run --no-sync pre-commit run --all-files --show-diff-on-failure

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # hatch-vcs derives the version from the newest reachable tag, which a
          # shallow clone would not fetch.
          fetch-depth: 0
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - run: uv build
      - name: Check the metadata PyPI will render
        run: uvx twine check --strict dist/*
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
